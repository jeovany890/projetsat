security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_redirect_dashboard

            logout:
                path: app_logout
                target: app_login

            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/activation, roles: PUBLIC_ACCESS }

        # Routes phishing — accessibles sans connexion (lien reçu par email)
        # Restent dans le firewall main → session chargée si elle existe
        - { path: ^/track/, roles: PUBLIC_ACCESS }
        - { path: ^/phishing-alerte/, roles: PUBLIC_ACCESS }
        - { path: ^/phishing/fake, roles: PUBLIC_ACCESS }
        - { path: ^/phishing/signal/, roles: PUBLIC_ACCESS }

        # Routes phishing côté employé connecté
        - { path: ^/employe/phishing, roles: ROLE_EMPLOYE }

        # Espaces connectés
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/rssi, roles: ROLE_RSSI }
        - { path: ^/employe, roles: ROLE_EMPLOYE }

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
        ROLE_RSSI:  [ROLE_USER]
        ROLE_EMPLOYE: [ROLE_USER]