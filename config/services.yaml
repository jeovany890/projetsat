# config/services.yaml

parameters:
    # URL de base pour les liens de tracking phishing
    app.base_url: '%env(APP_BASE_URL)%'
    
    # Emails phishing
    mailer.phishing.boa: '%env(MAILER_PHISHING_BOA)%'
    mailer.phishing.sbee: '%env(MAILER_PHISHING_SBEE)%'
    mailer.phishing.unicef: '%env(MAILER_PHISHING_UNICEF)%'

services:
    # default configuration for services in App\
    _defaults:
        autowire: true
        autoconfigure: true

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    
    # Configuration PhishingService avec injection de baseUrl
    App\Service\PhishingService:
        arguments:
            $baseUrl: '%app.base_url%'