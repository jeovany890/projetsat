# config/services.yaml
parameters:
    mailer.phishing.boa:    '%env(MAILER_PHISHING_BOA)%'
    mailer.phishing.sbee:   '%env(MAILER_PHISHING_SBEE)%'
    mailer.phishing.unicef: '%env(MAILER_PHISHING_UNICEF)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        
    App\EventSubscriber\EntrepriseStatusSubscriber:
        autowire: true
        autoconfigure: true
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\NativeRateLimiter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\EventSubscriber\AccessDeniedListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception }